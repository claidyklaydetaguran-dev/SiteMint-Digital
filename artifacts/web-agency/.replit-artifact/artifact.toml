kind = "web"
previewPath = "/"
title = "Web Agency Website"
version = "1.0.0"
id = "artifacts/web-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22065

[services.development]
run = "pnpm --filter @workspace/web-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-agency", "run", "build" ]
publicDir = "artifacts/web-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22065"
BASE_PATH = "/"
