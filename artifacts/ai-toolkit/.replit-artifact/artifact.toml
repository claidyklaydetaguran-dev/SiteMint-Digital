kind = "web"
previewPath = "/ai-toolkit"
title = "SMB AI Toolkit"
version = "1.0.0"
id = "artifacts/ai-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ai-toolkit" ]
localPort = 25594

[services.development]
run = "pnpm --filter @workspace/ai-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-toolkit", "run", "build" ]
publicDir = "artifacts/ai-toolkit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25594"
BASE_PATH = "/ai-toolkit/"
